<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datatouille — Recettes bébé</title>
  <meta name="description" content="Toutes les recettes Hamstouille pour bébé, organisées et consultables.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3d8b5e">
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Datatouille">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Favicon -->
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="#" class="logo" aria-label="Accueil">
        <span class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
        </span>
        <span class="logo-text">datatouille</span>
      </a>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème" type="button">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero / Search -->
  <section class="hero" id="hero">
    <div class="hero-inner">
      <h1 class="hero-title">Les recettes de bébé</h1>
      <p class="hero-subtitle">275 recettes pour accompagner la diversification alimentaire</p>
      <div class="search-wrapper">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Chercher une recette, un ingrédient..."
          autocomplete="off"
          aria-label="Rechercher une recette"
        >
        <button class="search-clear" id="searchClear" type="button" aria-label="Effacer la recherche" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- Filters -->
  <section class="filters-section" id="filters">
    <div class="filters-inner">
      <!-- Category chips -->
      <div class="filter-row">
        <div class="filter-chips" id="categoryChips" role="listbox" aria-label="Catégories">
          <button class="chip active" data-category="all" role="option" aria-selected="true">Toutes</button>
        </div>
      </div>
      <!-- Dietary filters -->
      <details class="dietary-filters" id="dietaryFilters">
        <summary class="dietary-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <span>Filtres alimentaires</span>
          <span class="dietary-count" id="dietaryCount" hidden>0</span>
        </summary>
        <div class="dietary-grid" id="dietaryGrid"></div>
      </details>
    </div>
  </section>

  <!-- Results count -->
  <div class="results-bar">
    <div class="results-inner">
      <span id="resultsCount" class="results-count"></span>
    </div>
  </div>

  <!-- Recipe Grid -->
  <main class="main">
    <div class="recipe-grid" id="recipeGrid"></div>
    <div class="no-results" id="noResults" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <p>Aucune recette trouvée</p>
      <button class="btn-reset" id="resetFilters" type="button">Réinitialiser les filtres</button>
    </div>
  </main>

  <!-- Recipe Detail Overlay -->
  <div class="overlay" id="overlay" hidden>
    <div class="overlay-backdrop" id="overlayBackdrop"></div>
    <article class="recipe-detail" id="recipeDetail" role="dialog" aria-modal="true" aria-label="Détail recette">
      <button class="detail-close" id="detailClose" type="button" aria-label="Fermer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="detail-content" id="detailContent"></div>
    </article>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>Données issues de <strong>Hamstouille</strong> — app personnelle</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
